name: Weekly Contract Monitor

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# ─────────────────────────────────────────────────────────────────────────────
# Workflow: Check for API schema drift every week
#
# This workflow:
# 1. Fetches the live OpenAPI schema from the API
# 2. Regenerates the constants/api-endpoints.ts file
# 3. Compares the generated file against the last known version
# 4. Posts a GitHub issue comment if drift is detected
# 5. Sends optional Slack notification (if SLACK_WEBHOOK is configured)
#
# This is informational only — never blocks PRs or breaks the build.
# Use this to stay aware of API schema changes.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  contract-monitor:
    name: Check API Contract Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate endpoints from live API
        id: generate
        run: |
          npm run generate:endpoints
          echo "completed=true" >> "$GITHUB_OUTPUT"
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        continue-on-error: true

      - name: Detect schema changes
        id: diff
        run: |
          if git diff --exit-code constants/api-endpoints.ts > /dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ No schema changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff constants/api-endpoints.ts | head -100 > /tmp/schema-diff.txt
            echo "⚠️ Schema drift detected — see diff below"
          fi

      - name: Post GitHub issue comment (drift detected)
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.existsSync('/tmp/schema-diff.txt') 
              ? fs.readFileSync('/tmp/schema-diff.txt', 'utf-8').substring(0, 2000)
              : '';
            
            const body = `## ⚠️ API Schema Drift Detected\n\n` +
              `**Date:** ${new Date().toISOString()}\n\n` +
              `The live OpenAPI schema at **${process.env.API_BASE_URL}/api/schema/** ` +
              `has changed since the last generated \`constants/api-endpoints.ts\`.\n\n` +
              `**Action Required:**\n` +
              `1. Review the changes: \`npm run generate:endpoints\`\n` +
              `2. Verify newly added/removed endpoints in the OpenAPI spec\n` +
              `3. Update adapters if needed to use new endpoints\n` +
              `4. Commit the regenerated file: \`constants/api-endpoints.ts\`\n\n` +
              `**Schema Diff (first 2KB):**\n` +
              '```diff\n' + diff + '\n```\n\n' +
              `**Tools:**\n` +
              `- Run \`npm run generate:endpoints\` locally to regenerate\n` +
              `- Run \`npm run validate:endpoints\` to check adapter compatibility\n` +
              `- Run \`npm run validate:endpoints:verbose\` to see endpoint usage\n`;
            
            // Get or create a contract-drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'contract-drift',
              per_page: 1
            });
            
            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
              console.log(`Posted comment to issue #${issues.data[0].number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔔 API Schema Drift Detected',
                body: body,
                labels: ['contract-drift', 'api']
              });
              console.log(`Created issue #${issue.data.number}`);
            }
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Slack notification (drift detected)
        if: failure() && steps.diff.outputs.changed == 'true' && secrets.SLACK_WEBHOOK
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔔 API Schema Drift Detected",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *API Schema Drift Detected*\n\nThe live OpenAPI schema has changed.\n<${{ github.server_url }}/${{ github.repository }}/issues|Open Issue> • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Summary
        if: always()
        run: |
          echo "### Contract Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generate:** ${{ steps.generate.outputs.completed }}" >> $GITHUB_STEP_SUMMARY
          echo "**Schema Changed:** ${{ steps.diff.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.diff.outputs.changed }}" == "true" ]; then
            echo "⚠️ Schema drift detected. GitHub issue created/updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No schema drift — API contract is stable." >> $GITHUB_STEP_SUMMARY
          fi
